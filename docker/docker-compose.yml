services:
  postgres:
    image: postgres:16

    container_name: iei-postgres

    environment:
      POSTGRES_DB: iei_db
      POSTGRES_USER: iei_user
      POSTGRES_PASSWORD: iei_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: