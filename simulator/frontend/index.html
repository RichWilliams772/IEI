<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electrical Diagram Simulator</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f6f8;
            --panel: #ffffff;
            --text: #17212b;
            --muted: #5f6f7f;
            --line: #d8e0e8;
            --accent: #176b87;
            --accent-strong: #0f5369;
            --danger: #b42318;
            --ok: #247a3d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.45;
        }

        header {
            background: #ffffff;
            border-bottom: 1px solid var(--line);
            padding: 18px 24px;
        }

        main {
            max-width: 1120px;
            margin: 0 auto;
            padding: 24px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }

        h2 {
            margin: 0 0 14px;
            font-size: 18px;
        }

        button {
            border: 1px solid var(--accent);
            background: var(--accent);
            color: #ffffff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            min-height: 36px;
            padding: 8px 12px;
        }

        button:hover {
            background: var(--accent-strong);
        }

        button.secondary {
            background: #ffffff;
            color: var(--accent);
        }

        button.secondary:hover {
            background: #eef7fa;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 18px;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }

        .metric {
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 12px;
        }

        .metric span {
            color: var(--muted);
            display: block;
            font-size: 13px;
        }

        .metric strong {
            display: block;
            font-size: 22px;
            margin-top: 4px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th,
        td {
            border-bottom: 1px solid var(--line);
            padding: 10px 8px;
            text-align: left;
            vertical-align: middle;
        }

        th {
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        .status {
            border-radius: 999px;
            display: inline-block;
            font-size: 12px;
            font-weight: 700;
            min-width: 74px;
            padding: 4px 8px;
            text-align: center;
        }

        .status.on {
            background: #e8f5ec;
            color: var(--ok);
        }

        .status.off {
            background: #fff0ee;
            color: var(--danger);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .message {
            color: var(--muted);
            margin-top: 12px;
            min-height: 20px;
        }

        .run-state {
            color: var(--muted);
            font-size: 14px;
            margin-top: 8px;
        }

        .error {
            color: var(--danger);
        }

        @media (max-width: 760px) {
            main {
                padding: 16px;
            }

            table,
            thead,
            tbody,
            th,
            td,
            tr {
                display: block;
            }

            thead {
                display: none;
            }

            tr {
                border-bottom: 1px solid var(--line);
                padding: 10px 0;
            }

            td {
                border: 0;
                display: flex;
                justify-content: space-between;
                gap: 16px;
                padding: 6px 0;
            }

            td::before {
                color: var(--muted);
                content: attr(data-label);
                font-weight: 700;
            }

            td.actions-cell {
                display: block;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Electrical Diagram Simulator</h1>
        <div class="toolbar">
            <button id="step-btn">Simulate Step</button>
            <button id="reload-btn" class="secondary">Reload Model</button>
            <button id="refresh-btn" class="secondary">Refresh</button>
        </div>
        <div id="run-state" class="run-state">Checking simulation loop...</div>
        <div id="message" class="message"></div>
    </header>

    <main class="grid">
        <section class="panel">
            <h2>System Summary</h2>
            <div class="summary">
                <div class="metric">
                    <span>Components</span>
                    <strong id="component-count">0</strong>
                </div>
                <div class="metric">
                    <span>Energized</span>
                    <strong id="energized-count">0</strong>
                </div>
                <div class="metric">
                    <span>Frequency</span>
                    <strong id="frequency">--</strong>
                </div>
                <div class="metric">
                    <span>Updated</span>
                    <strong id="updated">--</strong>
                </div>
            </div>
        </section>

        <section class="panel">
            <h2>Components</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Status</th>
                        <th>Voltage</th>
                        <th>Real Power</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="component-rows"></tbody>
            </table>
        </section>
    </main>

    <script>
        const rows = document.getElementById('component-rows');
        const message = document.getElementById('message');
        const componentCount = document.getElementById('component-count');
        const energizedCount = document.getElementById('energized-count');
        const frequency = document.getElementById('frequency');
        const updated = document.getElementById('updated');
        const runState = document.getElementById('run-state');

        let model = null;
        let state = null;
        let status = null;
        let isLoading = false;

        function setMessage(text, isError = false) {
            message.textContent = text;
            message.className = isError ? 'message error' : 'message';
        }

        function formatNumber(value, suffix = '') {
            if (value === null || value === undefined || Number.isNaN(Number(value))) {
                return '--';
            }
            return `${Number(value).toLocaleString(undefined, { maximumFractionDigits: 1 })}${suffix}`;
        }

        async function request(url, options = {}) {
            const response = await fetch(url, options);
            if (!response.ok) {
                const text = await response.text();
                throw new Error(text || response.statusText);
            }
            return response.json();
        }

        async function loadData() {
            if (isLoading) {
                return;
            }

            try {
                isLoading = true;
                const [modelData, stateData, statusData] = await Promise.all([
                    request('/api/model'),
                    request('/api/state'),
                    request('/api/simulation/status')
                ]);
                model = modelData;
                state = stateData;
                status = statusData;
                render();
                setMessage('Ready');
            } catch (error) {
                setMessage(`Failed to load simulator: ${error.message}`, true);
            } finally {
                isLoading = false;
            }
        }

        function render() {
            const components = model?.components || [];
            const componentStates = state?.components || {};
            const energized = Object.values(componentStates).filter(item => item.energized).length;

            componentCount.textContent = components.length;
            energizedCount.textContent = energized;
            frequency.textContent = formatNumber(state?.frequency, ' Hz');
            updated.textContent = state?.timestamp ? new Date(state.timestamp * 1000).toLocaleTimeString() : '--';
            runState.textContent = status?.running
                ? `Continuous simulation running at ${status.sampling_rate_ms} ms`
                : 'Continuous simulation is not running';

            rows.innerHTML = components.map(component => {
                const current = componentStates[component.id] || {};
                const isBreaker = component.type === 'breaker';
                const isEnergized = Boolean(current.energized);
                const statusText = isBreaker
                    ? (current.state ? 'Closed' : 'Open')
                    : (isEnergized ? 'Energized' : 'Off');
                const statusClass = current.state === false || !isEnergized ? 'off' : 'on';
                const actions = isBreaker
                    ? `<div class="actions">
                        <button class="secondary" onclick="setBreaker('${component.id}', 'close')">Close</button>
                        <button class="secondary" onclick="setBreaker('${component.id}', 'open')">Open</button>
                    </div>`
                    : '';

                return `
                    <tr>
                        <td data-label="Name">${component.name}</td>
                        <td data-label="Type">${component.type}</td>
                        <td data-label="Status"><span class="status ${statusClass}">${statusText}</span></td>
                        <td data-label="Voltage">${formatNumber(current.voltage, ' V')}</td>
                        <td data-label="Real Power">${formatNumber(current.real_power, ' kW')}</td>
                        <td data-label="Actions" class="actions-cell">${actions}</td>
                    </tr>
                `;
            }).join('');
        }

        async function setBreaker(id, action) {
            try {
                setMessage(`${action === 'open' ? 'Opening' : 'Closing'} ${id}...`);
                await request(`/api/breakers/${id}/${action}`, { method: 'POST' });
                await loadData();
            } catch (error) {
                setMessage(`Breaker update failed: ${error.message}`, true);
            }
        }

        document.getElementById('step-btn').addEventListener('click', async () => {
            try {
                setMessage('Running simulation step...');
                await request('/api/simulate/step', { method: 'POST' });
                await loadData();
            } catch (error) {
                setMessage(`Simulation step failed: ${error.message}`, true);
            }
        });

        document.getElementById('reload-btn').addEventListener('click', async () => {
            try {
                setMessage('Reloading model...');
                await request('/api/model/reload', { method: 'POST' });
                await loadData();
            } catch (error) {
                setMessage(`Reload failed: ${error.message}`, true);
            }
        });

        document.getElementById('refresh-btn').addEventListener('click', loadData);
        window.addEventListener('load', loadData);
        window.setInterval(loadData, 1000);
    </script>
</body>
</html>
